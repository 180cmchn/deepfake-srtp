version: "3.9"
services:
  mysql:
    image: mysql:8.0
    container_name: deepfake-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dylan
      MYSQL_DATABASE: deepfake_detection
      MYSQL_USER: deepfake
      MYSQL_PASSWORD: deepfake123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -pdylan --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
volumes:
  mysql_data: